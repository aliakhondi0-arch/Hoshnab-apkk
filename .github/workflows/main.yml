name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Android SDK Command-line Tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -O https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-*_latest.zip
          mv cmdline-tools latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Generate Manifest and Resources
        run: |
          mkdir -p app/src/main
          
          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="ir.hoshnab.app">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:allowBackup="true"
                  android:label="هوش ناب"
                  android:supportsRtl="true"
                  android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                      <meta-data android:name="android.webkit.WebView.MetricsOptOut" android:value="true" />
                  </activity>
              </application>
          </manifest>
          EOF
          
          # MainActivity.java
          mkdir -p app/src/main/java/ir/hoshnab/app
          cat > app/src/main/java/ir/hoshnab/app/MainActivity.java << 'EOF'
          package ir.hoshnab.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import android.webkit.WebViewClient;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView wv = new WebView(this);
                  WebSettings ws = wv.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setDomStorageEnabled(true);
                  ws.setSupportZoom(false);
                  wv.setWebViewClient(new WebViewClient());
                  wv.loadUrl("https://hoshnab.ir/");
                  setContentView(wv);
              }
          }
          EOF

      - name: Build APK with AAPT and D8
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export BUILD_TOOLS=$ANDROID_HOME/build-tools/34.0.0
          export PLATFORM=$ANDROID_HOME/platforms/android-34
          
          # compile resources
          $BUILD_TOOLS/aapt2 compile -o compiled.flatapp --dir app/src/main
          $BUILD_TOOLS/aapt2 link -o base.apk -I $PLATFORM/android.jar --manifest app/src/main/AndroidManifest.xml --java gen compiled.flatapp
          
          # compile java
          mkdir -p obj
          javac -source 1.8 -target 1.8 -bootclasspath $JAVA_HOME/jre/lib/rt.jar -classpath $PLATFORM/android.jar -d obj gen/ir/hoshnab/app/*.java app/src/main/java/ir/hoshnab/app/*.java
          
          # dex
          $BUILD_TOOLS/d8 --lib $PLATFORM/android.jar --output . obj/**/*.class
          $BUILD_TOOLS/aapt add base.apk classes.dex
          
          # align & sign
          $BUILD_TOOLS/zipalign -f 4 base.apk aligned.apk
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug, OU=Dev, O=HoshNab, L=Tehran, ST=Tehran, C=IR"
          $BUILD_TOOLS/apksigner sign --ks debug.keystore --ks-pass pass:android aligned.apk
          mv aligned.apk hoshnab.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hoshnab-apk
          path: hoshnab.apk
