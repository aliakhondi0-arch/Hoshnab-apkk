name: Build APK from PWA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize TWA
        run: bubblewrap init --manifest="https://hoshnab.ir/manifest.json" --directory="twap" --package="ir.hoshnab.app"

      - name: Generate keystore
        run: keytool -genkey -v -keystore ./release.keystore -alias hoshnab -keyalg RSA -keysize 2048 -validity 10000 -storepass hoshnab123 -keypass hoshnab123 -dname "CN=HoshNab, OU=App, O=HoshNab, L=Tehran, S=Tehran, C=IR"

      - name: Build APK
        run: |
          bubblewrap build --directory="twap" \
            --signingKeyPath=../release.keystore \
            --signingKeyAlias=hoshnab \
            --signingKeyPassword=hoshnab123 \
            --signingKeyStorePassword=hoshnab123

      - name: Prepare artifact
        run: |
          mkdir -p output
          cp twap/app/build/outputs/apk/release/*.apk ./output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hoshnab-apk
          path: output/
